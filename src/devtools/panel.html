<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirect Rules</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <header>
      <h1>请求重定向规则</h1>
      <button id="add-group-btn">+ 新建规则组</button>
    </header>
    <main>
      <div id="groups"></div>
    </main>

    <template id="group-template">
      <section class="group" draggable="true">
        <div class="group-header">
          <span class="drag-handle" title="拖动排序">☰</span>
          <input class="group-name" type="text" />
          <label class="toggle-wrap">
            <input class="group-enabled" type="checkbox" />
            组启用
          </label>
          <button class="add-rule-btn">+ 规则</button>
          <button class="delete-group-btn danger">删除组</button>
        </div>
        <div class="rules" data-dropzone="rules"></div>
      </section>
    </template>

    <template id="rule-template">
      <article class="rule" draggable="true">
        <div class="rule-row">
          <span class="drag-handle" title="拖动排序/跨组">↕</span>
          <label class="toggle-wrap"><input class="rule-enabled" type="checkbox" />启用</label>
          <select class="scope">
            <option value="url">整个 URL</option>
            <option value="host">仅 Host</option>
          </select>
          <select class="match-type">
            <option value="contains">包含</option>
            <option value="equals">等于</option>
            <option value="regex">正则</option>
            <option value="wildcard">通配符</option>
          </select>
        </div>
        <div class="rule-row">
          <input class="pattern" type="text" placeholder="匹配规则，例如 api.example.com 或 ^https://a\.com/(.*)$" />
        </div>
        <div class="rule-row">
          <input class="redirect" type="text" placeholder="重定向目标，正则模式支持 $1、$2 ..." />
          <button class="delete-rule-btn danger">删除</button>
        </div>
      </article>
    </template>

    <script type="module" src="panel.js"></script>
  </body>
</html>
